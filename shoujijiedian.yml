port: 7890
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
dns:
  enable: true
  ipv6: false
  use-hosts: true
  use-system-hosts: false
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - +.stun.*.*
    - +.stun.*.*.*
    - +.stun.*.*.*.*
    - +.stun.*.*.*.*.*
    - '*.rexuexia.com'
    - '*.msftncsi.com'
    - 'dns.msftncsi.com'
    - '*.msftncsi.com'
    - 'dns.msftncsi.com'
    - 'time.android.com'
    - +.stun.playstation.net
    - '*.msftconnecttest.com'
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://dns.twnic.tw/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
proxies:
  - name: 🇺🇸_美国_chatou_vless
    server: 104.18.42.163
    port: 443
    client-fingerprint: chrome
    type: vless
    uuid: fc09ecb6-af2d-41f8-af08-6b597bb436ef
    tls: true
    udp: false
    skip-cert-verify: false
    servername: powcan.chatou.ip-ddns.com
    network: ws
    ws-opts:
      path: /?ed=2560
      headers:
        Host: powcan.chatou.ip-ddns.com
proxy-groups:
  - name: 🔰 节点选择
    type: select
    proxies:
      - 🇺🇸_美国_chatou_vless
      - DIRECT
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400
  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400
rules:
  - IP-CIDR,223.5.5.5/32,DIRECT,no-resolve
  - IP-CIDR,119.29.29.29/32,DIRECT,no-resolve
  - IP-CIDR,1.1.1.1/32,🔰 节点选择,no-resolve
  - IP-CIDR,8.8.4.4/32,🔰 节点选择,no-resolve
